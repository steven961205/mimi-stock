function autoCalcTWFee() {
    const discountInput = document.getElementById('tradeDiscount').value;
    const sh = parseFloat(document.getElementById('tradeShares').value) || 0;
    const bp = parseFloat(document.getElementById('tradeBuyPrice').value) || 0;
    const sp = parseFloat(document.getElementById('tradeSellPrice').value) || 0;

    if (discountInput !== '' && sh > 0) {
        const discount = parseFloat(discountInput) || 10;
        const rate = 0.001425 * (discount / 10);
        
        let totalFee = 0;
        
        if (bp > 0) {
            totalFee += Math.max(1, Math.floor(bp * sh * rate));
        }
        
        if (sp > 0) {
            totalFee += Math.max(1, Math.floor(sp * sh * rate));
            document.getElementById('tradeTax').value = Math.floor(sp * sh * 0.003);
        } else {
            document.getElementById('tradeTax').value = '';
        }
        
        if (totalFee > 0) {
            document.getElementById('tradeFee').value = totalFee;
        } else {
            document.getElementById('tradeFee').value = '';
        }
    }
    calcTradePreview();
}

function openTradeModal(name, idx = -1){
    document.getElementById('tradeName').value = name;
    document.getElementById('tradeIndex').value = idx === -1 ? '' : idx;

    const pi = participants.findIndex(p => p.name === name);
    let t = null;
    if (idx >= 0 && pi !== -1) {
        t = (participants[pi].trades || [])[idx];
    }

    document.getElementById('tradeModalTitle').textContent = t ? `編輯交易紀錄 — ${name}` : `新增交易紀錄 — ${name}`;
    document.getElementById('btn-save-trade').textContent = t ? '💾 儲存變更' : '＋ 新增紀錄';

    if (t) {
        document.getElementById('tradeTicker').value = t.ticker || '';
        document.getElementById('tradeTicker').dataset.name = t.stockName || '';
        document.getElementById('tradeTickerName').textContent = t.stockName || '';
        document.getElementById('tradeShares').value = t.shares || '';
        document.getElementById('tradeBuyPrice').value = t.buyPrice || '';
        document.getElementById('tradeSellPrice').value = t.sellPrice || '';
        document.getElementById('tradeDiscount').value = t.discount || '';
        document.getElementById('tradeFee').value = t.fee || '';
        document.getElementById('tradeTax').value = t.tax || '';
        document.getElementById('tradeInterest').value = t.interest || '';
        document.getElementById('tradeInterestRate').value = t.interestRate || '';
        document.getElementById('tradePnl').value = t.pnl || '';

        let dStr = t.date || '';
        if (dStr.includes('/')) {
            const parts = dStr.split('/');
            if (parts.length === 3) {
                const y = parts[0];
                const m = parts[1].padStart(2, '0');
                const d = parts[2].padStart(2, '0');
                dStr = `${y}-${m}-${d}`;
            }
        }
        document.getElementById('tradeDate').value = dStr;
    } else {
        ['tradeTicker','tradeShares','tradeBuyPrice','tradeSellPrice','tradeDiscount','tradeFee','tradeTax','tradeInterest','tradeInterestRate','tradePnl'].forEach(id=>document.getElementById(id).value='');
        document.getElementById('tradeTicker').dataset.name = '';
        document.getElementById('tradeTickerName').textContent = '';
        
        const today = new Date();
        const localDateStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
        document.getElementById('tradeDate').value = localDateStr;
    }

    document.getElementById('tradeCalcHint').classList.add('hidden');
    document.getElementById('tradeModal').classList.add('open');
}

function closeTradeModal(){document.getElementById('tradeModal').classList.remove('open');}

function calcTradePreview(){
    const sh=parseFloat(document.getElementById('tradeShares').value)||0;
    const bp=parseFloat(document.getElementById('tradeBuyPrice').value)||0;
    const sp=parseFloat(document.getElementById('tradeSellPrice').value)||0;
    const fee=parseFloat(document.getElementById('tradeFee').value)||0;
    const tax=parseFloat(document.getElementById('tradeTax').value)||0;
    const interest=parseFloat(document.getElementById('tradeInterest').value)||0;
    
    if(sh>0&&bp>0&&sp>0){
        const pnl=(sp-bp)*sh - fee - tax - interest;
        const el=document.getElementById('tradeCalcValue');
        el.textContent=(pnl>=0?'+':'')+pnl.toFixed(2);
        el.className='mono font-bold '+(pnl>=0?'text-emerald-400':'text-red-400');
        document.getElementById('tradePnl').value=pnl.toFixed(2);
        document.getElementById('tradeCalcHint').classList.remove('hidden');
    }
}

async function saveTrade(){
    const name = document.getElementById('tradeName').value;
    const pi = participants.findIndex(p=>p.name===name);
    if(pi === -1) return;

    const idxStr = document.getElementById('tradeIndex').value;
    const isEdit = idxStr !== '';
    const idx = isEdit ? parseInt(idxStr) : -1;

    const ticker=document.getElementById('tradeTicker').value.toUpperCase().trim();
    const shares=parseFloat(document.getElementById('tradeShares').value)||0;
    const buyPrice=parseFloat(document.getElementById('tradeBuyPrice').value)||0;
    const sellPrice=parseFloat(document.getElementById('tradeSellPrice').value)||0;
    const discount=parseFloat(document.getElementById('tradeDiscount').value)||'';
    const fee=parseFloat(document.getElementById('tradeFee').value)||0;
    const tax=parseFloat(document.getElementById('tradeTax').value)||0;
    const interest=parseFloat(document.getElementById('tradeInterest').value)||0;
    const interestRate=parseFloat(document.getElementById('tradeInterestRate').value)||0;
    const pnl=parseFloat(document.getElementById('tradePnl').value)||0;

    let dateVal = document.getElementById('tradeDate').value;
    if(!dateVal){
        const today = new Date();
        dateVal = `${today.getFullYear()}/${today.getMonth() + 1}/${today.getDate()}`;
    } else {
        const parts = dateVal.split('-');
        if(parts.length === 3){
            dateVal = `${parts[0]}/${parseInt(parts[1], 10)}/${parseInt(parts[2], 10)}`;
        }
    }

    if(!ticker||shares<=0){alert('請填入股票代號和股數');return;}
    
    const stockName = document.getElementById('tradeTicker').dataset.name || '';
    const newTrade = { ticker, stockName, shares, buyPrice, sellPrice, discount, fee, tax, interest, interestRate, pnl, date: dateVal };
    const tList = [...(participants[pi].trades||[])];

    if (isEdit) {
        tList[idx] = newTrade;
    } else {
        tList.push(newTrade);
        tradePageMap[name] = 1;  // 新增時跳回第一頁,讓用戶立刻看到新紀錄
    }

    db.ref('competitionDataV2/'+pi+'/trades').set(tList);
    closeTradeModal();setStatus('loading','🟡 同步交易紀錄中...');
}

function deleteTrade(name,idx){
    if(!confirm('確定刪除這筆交易紀錄？'))return;
    const pi=participants.findIndex(p=>p.name===name);if(pi===-1)return;
    const t=[...(participants[pi].trades||[])];t.splice(idx,1);
    db.ref('competitionDataV2/'+pi+'/trades').set(t);
}

function changeTradePage(name, delta){
    const p = participants.find(x=>x.name===name);
    if(!p) return;
    const trades = Array.isArray(p.trades) ? p.trades : [];
    const totalPages = Math.max(1, Math.ceil(trades.length / TRADES_PER_PAGE));
    const current = tradePageMap[name] || 1;
    const next = Math.max(1, Math.min(totalPages, current + delta));
    if(next === current) return;
    tradePageMap[name] = next;
    renderDashboard();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeTradeModal();closePokerModal();}});

// ── 璽子打牌紀錄 ──────────────────────────
function openPokerModal(){
    document.getElementById('pokerDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('pokerAmount').value = '';
    document.getElementById('pokerModal').classList.add('open');
}
function closePokerModal(){ document.getElementById('pokerModal').classList.remove('open'); }

function savePokerRecord(){
    const date   = document.getElementById('pokerDate').value;
    const amount = parseFloat(document.getElementById('pokerAmount').value);
    if(!date || isNaN(amount)){ alert('請填入日期和金額'); return; }
    const newRecord = { date, amount };
    db.ref('pokerRecordsV2').push(newRecord);
    closePokerModal();
}

function deletePokerRecord(key){
    if(!confirm('確定刪除這筆紀錄？')) return;
    db.ref('pokerRecordsV2/' + key).remove();
}

db.ref('pokerRecordsV2').on('value', snapshot=>{
    const data = snapshot.val();
    const records = data ? Object.entries(data).map(([k,v])=>({key:k,...v})) : [];
    records.sort((a,b)=> b.date.localeCompare(a.date));

    const container = document.getElementById('poker-records');
    const totalEl   = document.getElementById('poker-total-value');

    if(records.length === 0){
        container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:16px;font-size:13px;">尚無紀錄</div>';
        totalEl.textContent = 'NT$ 0';
        totalEl.style.color = 'var(--text-secondary)';
        return;
    }

    container.innerHTML = records.map(r=>{
        const pos = r.amount >= 0;
        const sign = pos ? '+' : '';
        const color = pos ? 'var(--accent-green)' : 'var(--accent-red)';
        const abs = Math.abs(r.amount).toLocaleString('zh-TW');
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(30,58,95,.4);">
            <span style="color:var(--text-secondary);font-size:13px;">${r.date}</span>
            <div style="display:flex;align-items:center;gap:12px;">
                <span class="mono font-bold" style="color:${color};font-size:15px;">${sign}NT$ ${abs}</span>
                <button class="btn-del" onclick="deletePokerRecord('${r.key}')" title="刪除">✕</button>
            </div>
        </div>`;
    }).join('');

    const total = records.reduce((sum,r)=>sum+(r.amount||0), 0);
    const totalSign = total >= 0 ? '+' : '';
    const totalAbs  = Math.abs(total).toLocaleString('zh-TW');
    totalEl.textContent = `${totalSign}NT$ ${totalAbs}`;
    totalEl.style.color = total > 0 ? 'var(--accent-green)' : total < 0 ? 'var(--accent-red)' : 'var(--text-secondary)';
});

const endDate=new Date('2026-11-04T00:00:00').getTime();
(function tick(){const d=endDate-Date.now();if(d<0){document.getElementById('countdown').textContent='比賽已結束！';return;}
document.getElementById('countdown').textContent=`${Math.floor(d/86400000)} 天 ${Math.floor(d%86400000/3600000)} 時 ${Math.floor(d%3600000/60000)} 分`;setTimeout(tick,60000);})();

// ── 自動刷新股價（每 10 秒）────────────────
const REFRESH_INTERVAL = 10; 
let refreshTimer = null;
let nextRefreshIn = REFRESH_INTERVAL;
let benchmarkRefreshCount = 0;

function updateRefreshCountdown(){
    const statusEl = document.getElementById('system-status');
    if(statusEl && statusEl.className.includes('status-ok')){
        const base = `🟢 已連線｜1 USD = ${usdToTwd.toFixed(2)} TWD`;
        statusEl.textContent = `${base}｜${new Date().toLocaleTimeString('zh-TW')}｜下次刷新：${nextRefreshIn}s`;
    }
}

async function refreshPrices(){
    if(participants.length === 0) return;
    setStatus('loading','🔄 刷新股價中...');
    let anyUpdate = false;
    await Promise.all(participants.map(async(p, pi)=>{
        const stocks = Array.isArray(p.stocks) ? p.stocks : [];
        await Promise.all(stocks.map(async(s, si)=>{
            if(!s.ticker) return;
            const isTW = s.ticker.endsWith('.TW') || s.ticker.endsWith('.TWO');
            if(isTW){
                const now = new Date();
                const twHour = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
                const h = twHour.getHours(), m = twHour.getMinutes(), day = twHour.getDay();
                const isWeekday = day>=1 && day<=5;
                const isMarketHour = (h===9&&m>=0)||(h>=10&&h<=12)||(h===13&&m<=30);
                if(!isWeekday || !isMarketHour) return; 
            }
            const result = await fetchStockPrice(s.ticker);
            if(!result) return;
            if(result.price !== participants[pi].stocks[si].currentPrice ||
               result.postPrice !== participants[pi].stocks[si].postPrice ||
               result.prePrice  !== participants[pi].stocks[si].prePrice){
                participants[pi].stocks[si].currentPrice = result.price;
                participants[pi].stocks[si].prevClose    = result.prevClose||null;
                participants[pi].stocks[si].postPrice    = result.postPrice||null;
                participants[pi].stocks[si].prePrice     = result.prePrice||null;
                participants[pi].stocks[si].session      = result.session||'';
                if(result.name) participants[pi].stocks[si].stockName=result.name;
                anyUpdate = true;
            }
        }));
    }));
    
    // 每 6 次刷新（約 60 秒）更新一次大盤指數
    benchmarkRefreshCount++;
    if(benchmarkRefreshCount >= 6){
        benchmarkRefreshCount = 0;
        await refreshBenchmarks();
    }
    
    renderDashboard(); 
    // 股價已更新 → 重繪曲線(今日端點會根據最新未實現損益移動)
    scheduleChartRender();
    const session = getMarketSession();
    setStatus('ok', `🟢 已連線｜1 USD = ${usdToTwd.toFixed(2)} TWD｜美股 ${session}｜${new Date().toLocaleTimeString('zh-TW')}`);
}

function startRefreshCountdown(){
    clearInterval(refreshTimer);
    nextRefreshIn = REFRESH_INTERVAL;
    refreshTimer = setInterval(async()=>{
        nextRefreshIn--;
        updateRefreshCountdown();
        if(nextRefreshIn <= 0){
            nextRefreshIn = REFRESH_INTERVAL;
            await refreshPrices();
        }
    }, 1000);
}

db.ref('competitionDataV2').on('value', ()=>{
    startRefreshCountdown();
}, { onlyOnce: false });

document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState === 'visible'){
        refreshPrices();
        refreshBenchmarks();
        refreshBenchmarkHistory();
        startRefreshCountdown();
    } else {
        clearInterval(refreshTimer);
    }
});

// ── 初始化：載入大盤指數 ───────────────
refreshBenchmarks();
refreshBenchmarkHistory();

// 每 30 分鐘刷新一次大盤歷史日K
setInterval(refreshBenchmarkHistory, 30 * 60 * 1000);
</script>
